<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>VocabMaster - Premium English Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon"></div>
                <h1>VocabMaster</h1>
            </div>
            <div class="controls">
                <label class="toggle-container">
                    <span class="toggle-label">覚えていない単語のみ表示</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="filter-toggle">
                        <span class="slider"></span>
                    </div>
                </label>
            </div>
        </header>

        <main class="main-content">
            <div class="upload-section" id="upload-section">
                <p>学習を始めるには、CSVファイルを選択してください。</p>
                <label for="csv-file" class="upload-btn">
                    CSVをアップロード
                    <input type="file" id="csv-file" accept=".csv" />
                </label>
            </div>

            <div class="stats-section" id="stats-section" style="display: none;">
                <div class="stat-card">
                    <span class="stat-value" id="total-count">0</span>
                    <span class="stat-label">総単語数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="learned-count">0</span>
                    <span class="stat-label">習得済み</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="remaining-count">0</span>
                    <span class="stat-label">未習得</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>

            <div class="flashcards-grid" id="flashcards-grid">
                <!-- Cards will be dynamically inserted here -->
            </div>
        </main>
    </div>

    <!-- Read local CSV robustly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
