<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>VocabMaster - Premium English Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon"></div>
                <h1>VocabMaster</h1>
            </div>
            
            <div class="controls">
                <!-- Category Flyout Menu -->
                <div class="category-dropdown" id="category-dropdown">
                    <button class="dropdown-btn" id="dropdown-btn">
                        カテゴリーから探す
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <div class="dropdown-content" id="dropdown-content">
                        <!-- Checkboxes inserted by JS -->
                        <div class="cat-list-inner" id="category-list"></div>
                    </div>
                </div>

                <div class="toggles-group">
                    <label class="toggle-container">
                        <span class="toggle-label">覚えていない単語のみ</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="filter-unlearned">
                            <span class="slider"></span>
                        </div>
                    </label>
                    
                    <label class="toggle-container">
                        <span class="toggle-label warning-text">要復習の単語のみ</span>
                        <div class="toggle-switch warning">
                            <input type="checkbox" id="filter-review">
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="upload-section" id="upload-section">
                <p>学習を始めるには、CSVファイルを選択してください。<br>
                <small>(※ 新フォーマット「カテゴリ, 単語, 意味と例文」対応)</small></p>
                <label for="csv-file" class="upload-btn">
                    CSVをアップロード
                    <input type="file" id="csv-file" accept=".csv" />
                </label>
            </div>

            <div class="stats-section" id="stats-section" style="display: none;">
                <div class="stat-card">
                    <span class="stat-value" id="total-count">0</span>
                    <span class="stat-label">総単語数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value text-success" id="learned-count">0</span>
                    <span class="stat-label">習得済み</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value text-warning" id="review-count">0</span>
                    <span class="stat-label">要復習</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>

            <div class="flashcards-grid" id="flashcards-grid">
                <!-- Cards will be dynamically inserted here -->
            </div>
        </main>
    </div>

    <!-- Read local CSV robustly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
